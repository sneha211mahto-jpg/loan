<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Money Solution</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#071739;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
color:black;
padding:30px;
border-radius:22px;
box-shadow:0px 10px 30px rgba(0,0,0,0.4);
text-align:center;
}

h1{
font-size:30px;
margin-bottom:5px;
color:#071739;
}

.sub{
color:#6B7280;
margin-bottom:20px;
font-size:14px;
}

label{
display:block;
text-align:left;
margin-top:15px;
margin-bottom:7px;
font-weight:600;
color:#111827;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #E5E7EB;
outline:none;
font-size:15px;
}

input:focus{
border:1px solid #D4A017;
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:14px;
background:#D4A017;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#b8860b;
}

.note{
margin-top:15px;
font-size:12px;
color:#6B7280;
}

.loader{
display:none;
margin-top:10px;
font-size:13px;
color:#071739;
}

</style>
</head>

<body>

<div class="box">

<h1>Admin Login</h1>
<p class="sub">Only authorized access</p>

<form id="loginForm">

<label>Email</label>
<input type="email" id="email" placeholder="Enter email" required>

<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>

<button type="submit">Login</button>

</form>

<p class="loader" id="loader">Logging in...</p>

<p class="note">🔒 Secure Admin Panel</p>

</div>

<script>

const form = document.getElementById("loginForm");
const loader = document.getElementById("loader");

form.addEventListener("submit", async (e) => {
e.preventDefault();

loader.style.display = "block";

const data = {
email: document.getElementById("email").value,
password: document.getElementById("password").value
};

try {

const res = await fetch("https://loan-bxtx.onrender.com/admin/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
});

const result = await res.json();

// 🔥 FIXED PART (IMPORTANT)
if (result.success) {
    
    // token save (JWT use ke liye)
    localStorage.setItem("token", result.token);

    // redirect fix (no undefined error)
    window.location.href = "dashboard.html";

} else {
    alert(result.message || "Invalid Credentials ❌");
}

} catch (error) {
alert("Server Error ❌");
}

loader.style.display = "none";

});

</script>

</body>
</html>
