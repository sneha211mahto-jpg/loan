<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Money Solution</title>

  <style>
    /* GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #071739;
      color: white;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
      color: #D4A017;
    }

    /* TOP SECTION */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 20px;
      gap: 10px;
    }

    /* COUNTER */
    .counter {
      font-size: 16px;
      font-weight: bold;
    }

    /* SEARCH */
    .search-box {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      width: 250px;
    }

    /* LOGOUT */
    .logout-btn {
      position: absolute;
      right: 20px;
      top: 20px;
      background: #D4A017;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    /* TABLE */
    .container {
      width: 95%;
      margin: auto;
      overflow-x: auto;
      padding-bottom: 40px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
    }

    th {
      background: #D4A017;
      color: white;
      padding: 14px;
      text-transform: uppercase;
    }

    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f5f5f5;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: white;
    }

    .notification-bell {
      position: absolute;
      top: 20px;
      right: 120px;
      font-size: 24px;
      cursor: pointer;
    }

    .notification-count {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 12px;
      position: relative;
      top: -12px;
      left: -5px;
    }

    .toast {
      position: fixed;
      top: 80px;
      right: 20px;
      background: white;
      color: black;
      padding: 15px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      z-index: 9999;
      animation: slideIn .4s ease;
    }

    .notification-panel {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 320px;
      background: white;
      color: black;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      display: none;
      max-height: 300px;
      overflow-y: auto;
      z-index: 9999;
    }

    .notification-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
      }
      to {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>

  <button class="logout-btn" onclick="logout()">Logout</button>

  <div class="header">📊 Money Solution Admin Dashboard</div>
  <div class="notification-bell">🔔 <span class="notification-count" id="notifyCount">0</span></div>
  <div class="notification-panel" id="notifyPanel"></div>

  <div class="topbar">
    <div class="counter">Total Leads: <span id="count">0</span></div>
    <input type="text" class="search-box" placeholder="Search by Name..." onkeyup="searchByName()" />
  </div>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Sr No.</th>
          <th>Name</th>
          <th>Phone Number</th>
          <th>Loan Amount</th>
          <th>Salary</th>
          <th>Loan Type</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="data">
        <tr>
          <td colspan="7" class="empty">Loading data...</td>
        </tr>
      </tbody>
    </table>
  </div>




<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
  // 1. Sabse pehle socket ko initialize karo
  const socket = io("https://loan-bxtx.onrender.com");
  
  // 2. Global variables
  let allData = [];
  let notifications = [];
  let notificationCount = 0;
  let notificationSound = new Audio("notification.mp3");

  // 3. Socket real-time event listener (Notification & Sound)
  socket.on("newLead", (data) => {
    console.log("New realtime lead received:", data);
    notifications.unshift(data);
    
    if (notifications.length > 10) notifications.pop();

    try {
      notificationSound.currentTime = 0;
      notificationSound.play();
    } catch(e) { console.log("Audio play blocked"); }

    notificationCount++;
    document.getElementById("notifyCount").innerText = notificationCount;

    // Toast Popup
    const popup = document.createElement("div");
    popup.className = "toast";
    popup.innerHTML = `
      <h3>🔔 New Lead Received</h3>
      <p><b>${data.name || 'Someone'}</b> has applied for a <b>${data.loanType || 'Loan'}</b> of <b>₹${data.loan || '0'}</b></p>
      <p>📞 ${data.phone || 'N/A'}</p>
    `;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 6000);

    // Table reload karo jab naya data aaye
    loadData();
  });

  // 4. JWT Authorization Token Check
  const token = localStorage.getItem("token");
  if (!token) {
    alert("Unauthorized Access ❌ Please login first");
    window.location.href = "https://loan-bxtx.onrender.com/admin.html";
  }

  // 5. Load Data from Backend API
  async function loadData() {
    try {
      const res = await fetch("https://loan-bxtx.onrender.com/leads", {
        headers: { "Authorization": `Bearer ${token}` }
      });
      allData = await res.json();
      document.getElementById("count").innerText = allData.length;
      render(allData);
    } catch (err) {
      alert("Server Error ❌");
    }
  }

  // 6. Render Data to HTML Table
  function render(data) {
    const tbody = document.getElementById("data");
    if (!data || !data.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">No Data Found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map((item, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${item.name || 'N/A'}</td>
        <td>${item.phone || 'N/A'}</td>
        <td>₹ ${item.loan || '0'}</td>
        <td>${item.salary || 'N/A'}</td>
        <td>${item.loanType || 'N/A'}</td>
        <td>
          <button onclick="deleteLead('${item._id}')" style="background:red;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;">Delete</button>
        </td>
      </tr>
    `).join("");
  }

  // 7. Search Only Name Function
  function searchByName(){
    let value = document.querySelector(".search-box").value.toLowerCase();
    let filtered = allData.filter(item => 
      item.name && item.name.toLowerCase().includes(value)
    );
    render(filtered);
  }

  // 8. Delete Lead Function
  async function deleteLead(id) {
    let confirmDelete = confirm("Delete this lead?");
    if (!confirmDelete) return;

    try {
      let res = await fetch("https://loan-bxtx.onrender.com/leads/" + id, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
      });
      let data = await res.json();
      if (data.success || res.status === 200) {
        alert("Deleted ✅");
        loadData();
      } else {
        alert("Delete failed ❌");
      }
    } catch (error) {
      alert("Server error ❌");
    }
  }

  // 9. Notification Panel Toggle Click Event
  document.querySelector(".notification-bell").addEventListener("click", () => {
    const panel = document.getElementById("notifyPanel");
    if (panel.style.display === "block") {
      panel.style.display = "none";
      return;
    }
    panel.style.display = "block";
    panel.innerHTML = notifications.length
      ? notifications.map(n => `
        <div class="notification-item">
          <b>${n.name}</b><br>
          ${n.loanType} - ₹${n.loan || '0'}<br>
          📞 ${n.phone}
        </div>
      `).join("")
      : "<div class='notification-item' style='text-align:center;'>No new notifications</div>";
  });

  // 10. Logout Function
  function logout(){
    if(confirm("Are you sure you want to logout?")){
      localStorage.removeItem("token");
      window.location.href = "https://loan-bxtx.onrender.com/admin.html";
    }
  }

  // Initial call page load par data laane ke liye
  loadData();
</script>
</body>
</html>
